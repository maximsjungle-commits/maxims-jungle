<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in Touch - Maxim's Jungle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

  <div class="contact-hero">

    <div class="site-header">
      <a href="index.html" class="logo-group">
        <div class="logo-underline"></div>
        <h1 class="logo-text">MAXIM'S<br>JUNGLE</h1>
      </a>
      <nav class="nav-group">
        <a href="me.html" class="nav-link">Me</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="contact.html" class="nav-link active">Get&nbsp;in&nbsp;touch</a>
      </nav>
    </div>

    <h2 class="contact-heading">Let's make something together.</h2>

    <form class="contact-form" onsubmit="return false;">
      <label class="contact-label" for="contact-name">Name</label>
      <input type="text" id="contact-name" class="contact-input">

      <label class="contact-label" for="contact-email">Email</label>
      <input type="email" id="contact-email" class="contact-input">

      <label class="contact-label" for="contact-message">Message</label>
      <textarea id="contact-message" class="contact-textarea"></textarea>

      <button type="submit" class="contact-send-btn">
        <img src="images/contact-btn-bg.png" alt="" class="contact-send-bg">
        <div class="contact-send-glass"></div>
        <span class="contact-send-text">SEND</span>
      </button>
    </form>

    <img src="images/contact-parrot.png" alt="" class="contact-parrot">

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="images/capybara-node.png" alt="" class="footer-scene">
    <a href="index.html" class="footer-col footer-left">
      <div class="footer-line"></div>
      <h2 class="footer-logo">MAXIM'S<br>JUNGLE</h2>
    </a>
    <div class="footer-col footer-center">
      <div class="footer-line"></div>
      <a href="me.html" class="footer-nav-link">Me</a>
      <a href="projects.html" class="footer-nav-link">Projects</a>
      <a href="contact.html" class="footer-nav-link">Get in touch</a>
    </div>
    <div class="footer-col footer-right">
      <div class="footer-line-wide"></div>
      <div class="footer-socials">
        <a href="#" class="footer-social-link" aria-label="Email">
          <svg width="43" height="34" viewBox="0 0 43 34" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="39" height="30" rx="4" stroke="white" stroke-width="4"/>
            <path d="M2 6L21.5 20L41 6" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="#" class="footer-social-link" aria-label="Instagram">
          <svg width="43" height="43" viewBox="0 0 43 43" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="39" height="39" rx="12" stroke="white" stroke-width="3"/>
            <circle cx="21.5" cy="21.5" r="9" stroke="white" stroke-width="3"/>
            <circle cx="33" cy="10" r="2.5" fill="white"/>
          </svg>
        </a>
      </div>
    </div>
    <a href="projects.html" class="footer-bottom-left">
      <p class="footer-showcase">PORTFOLIO<br>SHOWCASE</p>
      <div class="footer-line"></div>
    </a>
  </footer>

  <script>
    (function() {
      function fit() {
        var w = document.documentElement.clientWidth;
        var h = window.innerHeight;
        var s = Math.min(w / 1440, h / 801, 1.25);
        document.documentElement.style.setProperty('--s', s);
      }
      fit();
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', function() { setTimeout(fit, 100); });
    })();
  </script>
</body>
</html>
